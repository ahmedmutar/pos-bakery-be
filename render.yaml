# render.yaml — Sajiin API + Supabase Database
services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: sajiin-api
    runtime: node
    region: singapore
    plan: free

    buildCommand: npm install && npx prisma generate
    startCommand: npm start

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # Supabase — isi manual di Render dashboard
      - key: DATABASE_URL
        sync: false   # Transaction pooler URL (port 6543)

      - key: DIRECT_URL
        sync: false   # Direct connection URL (port 5432)

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 7d

      - key: ALLOWED_ORIGINS
        sync: false   # URL frontend Vercel

      - key: APP_URL
        sync: false

      - key: SUPER_ADMIN_KEY
        generateValue: true

      - key: ADMIN_NOTIFICATION_EMAIL
        sync: false

      - key: ADMIN_WHATSAPP
        value: "6208970120687"

      - key: BREVO_API_KEY
        sync: false

      - key: FROM_EMAIL
        sync: false

      - key: XENDIT_SECRET_KEY
        sync: false

      - key: XENDIT_WEBHOOK_TOKEN
        sync: false

  # ── Cron — keepalive ───────────────────────────────────────────────────────
  - type: cron
    name: sajiin-keepalive
    runtime: node
    plan: free
    schedule: "*/10 * * * *"
    buildCommand: echo "ok"
    startCommand: >
      node -e "fetch(process.env.API_URL||'https://sajiin-api.onrender.com').then(r=>console.log('ping',r.status)).catch(e=>console.error(e.message))"
